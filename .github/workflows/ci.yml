name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['22']
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Run tests
        run: npm test

  package:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build unpacked extension zip
        run: |
          zip -r typst-side-agent.zip manifest.json src docs icons README.md LICENSE \
            -x '*.DS_Store' -x '*/.*'

      - uses: actions/upload-artifact@v4
        with:
          name: typst-side-agent-unpacked
          path: typst-side-agent.zip
          retention-days: 14
